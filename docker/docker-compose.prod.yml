services:
  ranking-server:
    image: jbh1024/rescaper-ranking:${RESCAPER_TAG:-latest}
    container_name: rescaper-ranking-api
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - RANKING_SECRET_KEY=${RANKING_SECRET_KEY:-rescaper_secret_token_2024}
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-111111}
      - DB_NAME=${DB_NAME:-rescaper}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/rescaper-api/rankings"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rescaper:
    image: jbh1024/rescaper:${RESCAPER_TAG:-latest}
    container_name: rescaper-game
    ports:
      - "4431:80"
    depends_on:
      ranking-server:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
