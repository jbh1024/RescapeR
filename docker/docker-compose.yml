version: '3.8'

services:
  ranking-server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: rescaper-ranking-api
    ports:
      - "3000:3000"
    volumes:
      - ../server/ranking.db:/app/ranking.db
    environment:
      - NODE_ENV=production
      - RANKING_SECRET_KEY=rescaper_secret_token_2024
    restart: unless-stopped

  rescaper:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rescaper-game
    ports:
      - "8080:80"
    depends_on:
      - ranking-server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
