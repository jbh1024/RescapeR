services:
  ranking-server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: rescaper-ranking-api
    expose:
      - "3000"
    environment:
      - NODE_ENV=development
      - RANKING_SECRET_KEY=${RANKING_SECRET_KEY:?RANKING_SECRET_KEY 환경변수를 설정하세요}
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-111111}
      - DB_NAME=${DB_NAME:-rescaper}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/rescaper-api/rankings"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  rescaper:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: rescaper-game
    ports:
      - "8080:80"
    depends_on:
      ranking-server:
        condition: service_healthy
