<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="RescapeR - IT 회사 탈출 로그바니아 액션 게임" />
    <meta name="theme-color" content="#101a28" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <title>RescapeR - Roguevania Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hud">
        <h1>RescapeR</h1>
        <p class="subtitle">IT 회사 탈출 로그바니아 프로토타입</p>
        <div id="stats" class="panel hidden"></div>
        <div id="controls" class="panel hidden">
          <h2>조작법</h2>
          <p>이동: ← / →</p>
          <p>점프: ↑</p>
          <p>공격: Space</p>
          <p>대시: Shift</p>
          <p>소비 슬롯 사용: Q</p>
          <p>전투 스타일 변경(B1): C</p>
          <p>사운드 볼륨: - / =</p>
          <p>음소거: M / 이펙트 간소화: V</p>
          <p>일시정지: P</p>
          <p>상호작용/상점 열기: E</p>
          <p>상점 구매: 1 / 2 / 3 (종료: ESC)</p>
          <p>재시작: R</p>
          <p>조작법/로그 토글: H</p>
        </div>
        <div id="log" class="panel log hidden"></div>
      </section>
      <section class="game-area">
        <canvas id="game" width="1600" height="900"></canvas>
      </section>
    </main>

    <div id="overlay" class="overlay hidden"></div>

    <script src="systems/save-system.js"></script>
    <script src="systems/combat-system.js"></script>
    <script src="systems/ui-system.js"></script>
    <script src="systems/render-system.js"></script>
    <script src="systems/monster-archetype-system.js"></script>
    <script src="systems/floor-system.js"></script>
    <script src="game.js"></script>
  </body>
</html>
