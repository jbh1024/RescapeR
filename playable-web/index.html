<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="RescapeR - IT 회사 탈출 로그바니아 액션 게임" />
    <meta name="theme-color" content="#101a28" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <title>RescapeR - Roguevania Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="game-area">
        <canvas id="game" width="1600" height="900"></canvas>
      </section>
      
      <section class="hud">
        <div id="log" class="panel log"></div>
        <div id="controls" class="panel">
          <h2>조작법</h2>
          <p>이동: ← / → | 점프: ↑ | 공격: Space | 대시: Shift</p>
          <p>상호작용/다음 층: E | 일시정지: P | 패널 토글: H</p>
          <p>재시작: R | 사운드: M, V, -, =</p>
        </div>
        <div id="stats" class="panel" style="display:none;"></div>
      </section>
    </main>

    <div id="overlay" class="overlay hidden"></div>

    <script type="module" src="game.js"></script>
  </body>
</html>
