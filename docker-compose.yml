version: '3.8'

services:
  rescaper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rescaper-game
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 개발 시 볼륨 마운트 (핫리로드)
